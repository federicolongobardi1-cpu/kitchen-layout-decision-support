<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Opening Layout</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #fbfaf7;
      --border: #27313f;
      --muted: #657080;
      --grid: #e5e1d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
      color: var(--border);
    }

    .wrap {
      border: 1px solid #e3ded5;
      border-radius: 8px;
      background: var(--bg);
      padding: 0.9rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: baseline;
      margin-bottom: 0.75rem;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .room-shell {
      width: 100%;
      overflow: auto;
      padding: 26px;
    }

    .room {
      position: relative;
      margin: 0 auto;
      border: 2px solid var(--border);
      background:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
        var(--panel);
      background-size: 25px 25px;
      touch-action: none;
    }

    .opening {
      position: absolute;
      border-radius: 999px;
      color: #ffffff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      cursor: grab;
      user-select: none;
      z-index: 5;
      box-shadow: 0 8px 18px rgba(39, 49, 63, 0.18);
    }

    .opening.active {
      cursor: grabbing;
      z-index: 8;
      box-shadow: 0 10px 24px rgba(39, 49, 63, 0.24);
    }

    .door {
      background: #35c462;
    }

    .window {
      background: #4fb3d8;
    }

    .coords {
      margin-top: 0.65rem;
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div class="title">Room openings editor</div>
      <div class="hint">Drag doors and windows along the room perimeter</div>
    </div>
    <div class="room-shell">
      <div id="room" class="room"></div>
    </div>
    <div id="coords" class="coords"></div>
  </div>

  <script>
    const gridStepCm = 10;
    const dragThresholdPx = 4;
    const roomEl = document.getElementById("room");
    const coordsEl = document.getElementById("coords");
    const rootEl = document.documentElement;

    let latestArgs = null;
    let activeDrag = null;
    let scale = 1;

    function sendMessage(type, data) {
      window.parent.postMessage(
        Object.assign({ isStreamlitMessage: true, type: type }, data || {}),
        "*"
      );
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", { height: document.body.scrollHeight });
    }

    function setComponentValue(value) {
      sendMessage("streamlit:setComponentValue", { value: value });
    }

    function componentReady() {
      sendMessage("streamlit:componentReady", { apiVersion: 1 });
    }

    function clamp(value, minValue, maxValue) {
      return Math.min(Math.max(value, minValue), maxValue);
    }

    function snapToGrid(value) {
      return Math.round(value / gridStepCm) * gridStepCm;
    }

    function applyTheme(theme) {
      rootEl.style.setProperty("--bg", theme.panel_bg);
      rootEl.style.setProperty("--panel", theme.room_bg);
      rootEl.style.setProperty("--border", theme.text);
      rootEl.style.setProperty("--muted", theme.subtitle);
      rootEl.style.setProperty("--grid", theme.grid);
    }

    function sideLength(side, room) {
      return side === "top" || side === "bottom" ? room.width : room.depth;
    }

    function openingStyle(opening, room) {
      const thickness = 16;
      const widthPx = opening.width * scale;
      const posPx = opening.position * scale;
      const half = thickness / 2;

      if (opening.side === "top") {
        return { left: posPx, top: -half, width: widthPx, height: thickness };
      }
      if (opening.side === "bottom") {
        return { left: posPx, top: room.depth * scale - half, width: widthPx, height: thickness };
      }
      if (opening.side === "left") {
        return { left: -half, top: posPx, width: thickness, height: widthPx };
      }
      return { left: room.width * scale - half, top: posPx, width: thickness, height: widthPx };
    }

    function nearestPerimeter(clientX, clientY, roomRect, room) {
      const xCm = clamp((clientX - roomRect.left) / scale, 0, room.width);
      const yCm = clamp((clientY - roomRect.top) / scale, 0, room.depth);
      const distances = [
        { side: "top", distance: yCm, position: xCm },
        { side: "bottom", distance: room.depth - yCm, position: xCm },
        { side: "left", distance: xCm, position: yCm },
        { side: "right", distance: room.width - xCm, position: yCm },
      ];
      return distances.sort((a, b) => a.distance - b.distance)[0];
    }

    function renderLayout(args) {
      latestArgs = args;
      const room = args.room;
      applyTheme(args.theme);
      const roomWidthPx = Math.min(760, Math.max(320, window.innerWidth - 72));

      scale = roomWidthPx / room.width;
      roomEl.innerHTML = "";
      roomEl.style.width = roomWidthPx + "px";
      roomEl.style.height = room.depth * scale + "px";

      (args.openings || []).forEach((opening) => {
        const item = document.createElement("div");
        const style = openingStyle(opening, room);
        item.className = "opening " + opening.kind;
        item.dataset.openingId = opening.id;
        item.style.left = style.left + "px";
        item.style.top = style.top + "px";
        item.style.width = style.width + "px";
        item.style.height = style.height + "px";
        item.textContent = opening.label;
        item.addEventListener("pointerdown", onPointerDown);
        roomEl.appendChild(item);
      });

      coordsEl.textContent = "Drag openings to snap them to a wall";
      setFrameHeight();
    }

    function getOpeningById(openingId) {
      return (latestArgs.openings || []).find((opening) => opening.id === openingId);
    }

    function onPointerDown(event) {
      const openingId = event.currentTarget.dataset.openingId;
      activeDrag = {
        element: event.currentTarget,
        openingId: openingId,
        pointerId: event.pointerId,
        startClientX: event.clientX,
        startClientY: event.clientY,
        hasMoved: false,
      };

      activeDrag.element.setPointerCapture(event.pointerId);
      activeDrag.element.addEventListener("pointermove", onPointerMove);
      activeDrag.element.addEventListener("pointerup", onPointerUp);
      activeDrag.element.addEventListener("pointercancel", onPointerUp);
    }

    function updateDraggedOpening(event) {
      const opening = getOpeningById(activeDrag.openingId);
      const room = latestArgs.room;
      const roomRect = roomEl.getBoundingClientRect();
      const snap = nearestPerimeter(event.clientX, event.clientY, roomRect, room);
      const maxPosition = Math.max(sideLength(snap.side, room) - opening.width, 0);
      const nextPosition = clamp(snapToGrid(snap.position - opening.width / 2), 0, maxPosition);
      const nextOpening = Object.assign({}, opening, {
        side: snap.side,
        position: nextPosition,
      });
      const style = openingStyle(nextOpening, room);

      activeDrag.element.style.left = style.left + "px";
      activeDrag.element.style.top = style.top + "px";
      activeDrag.element.style.width = style.width + "px";
      activeDrag.element.style.height = style.height + "px";
      coordsEl.textContent = opening.label + ": " + snap.side + ", " + nextPosition + " cm";

      return nextOpening;
    }

    function onPointerMove(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
        return;
      }

      const deltaX = event.clientX - activeDrag.startClientX;
      const deltaY = event.clientY - activeDrag.startClientY;
      if (!activeDrag.hasMoved) {
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        if (distance < dragThresholdPx) {
          return;
        }
        activeDrag.hasMoved = true;
        activeDrag.element.classList.add("active");
      }

      updateDraggedOpening(event);
    }

    function onPointerUp(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
        return;
      }

      activeDrag.element.classList.remove("active");
      activeDrag.element.releasePointerCapture(event.pointerId);
      activeDrag.element.removeEventListener("pointermove", onPointerMove);
      activeDrag.element.removeEventListener("pointerup", onPointerUp);
      activeDrag.element.removeEventListener("pointercancel", onPointerUp);

      if (!activeDrag.hasMoved) {
        activeDrag = null;
        return;
      }

      const updated = updateDraggedOpening(event);
      activeDrag = null;

      setComponentValue({
        event_id: Date.now(),
        opening_id: updated.id,
        side: updated.side,
        position: updated.position,
      });
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type !== "streamlit:render") {
        return;
      }
      renderLayout(data.args || {});
    });

    window.addEventListener("load", () => {
      componentReady();
      setFrameHeight();
    });

    window.addEventListener("resize", () => {
      if (latestArgs) {
        renderLayout(latestArgs);
      } else {
        setFrameHeight();
      }
    });
  </script>
</body>
</html>
