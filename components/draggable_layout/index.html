<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Draggable Layout</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #fbfaf7;
      --border: #27313f;
      --muted: #657080;
      --grid: #e5e1d8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
      color: var(--border);
    }

    .wrap {
      border: 1px solid #e3ded5;
      border-radius: 8px;
      background: var(--bg);
      padding: 0.9rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: baseline;
      margin-bottom: 0.75rem;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
    }

    .room {
      position: relative;
      width: 100%;
      max-width: 620px;
      margin: 0 auto;
      border: 2px solid var(--border);
      background:
        linear-gradient(to right, var(--grid) 1px, transparent 1px),
        linear-gradient(to bottom, var(--grid) 1px, transparent 1px),
        var(--panel);
      background-size: 25px 25px;
      overflow: hidden;
      touch-action: none;
    }

    .door {
      position: absolute;
      background: #111827;
      border-radius: 999px;
      z-index: 3;
    }

    .item {
      position: absolute;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 12px;
      font-weight: 700;
      color: #1f2937;
      cursor: grab;
      user-select: none;
      z-index: 4;
      box-shadow: 0 6px 16px rgba(39, 49, 63, 0.12);
    }

    .item.active {
      cursor: grabbing;
      box-shadow: 0 10px 24px rgba(39, 49, 63, 0.18);
      z-index: 6;
    }

    .coords {
      margin-top: 0.65rem;
      text-align: right;
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div class="title">Drag and drop layout editor</div>
      <div class="hint">Drag to move, double click to rotate 90 deg</div>
    </div>
    <div id="room" class="room"></div>
    <div id="coords" class="coords"></div>
  </div>

  <script>
    const gridStepCm = 10;
    const dragThresholdPx = 4;
    const roomEl = document.getElementById("room");
    const coordsEl = document.getElementById("coords");
    const rootEl = document.documentElement;

    let latestArgs = null;
    let activeDrag = null;
    let scale = 1;

    function sendMessage(type, data) {
      window.parent.postMessage(
        Object.assign({ isStreamlitMessage: true, type: type }, data || {}),
        "*"
      );
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", { height: document.body.scrollHeight });
    }

    function setComponentValue(value) {
      sendMessage("streamlit:setComponentValue", { value: value });
    }

    function componentReady() {
      sendMessage("streamlit:componentReady", { apiVersion: 1 });
    }

    function clamp(value, minValue, maxValue) {
      return Math.min(Math.max(value, minValue), maxValue);
    }

    function snapToGrid(value) {
      return Math.round(value / gridStepCm) * gridStepCm;
    }

    function applyTheme(theme) {
      rootEl.style.setProperty("--bg", theme.panel_bg);
      rootEl.style.setProperty("--panel", theme.room_bg);
      rootEl.style.setProperty("--border", theme.text);
      rootEl.style.setProperty("--muted", theme.subtitle);
      rootEl.style.setProperty("--grid", theme.grid);
    }

    function renderLayout(args) {
      latestArgs = args;
      const layout = args.layout_data;
      const room = layout.room;
      applyTheme(args.theme);
      const roomWidthPx = Math.min(620, Math.max(320, window.innerWidth - 48));

      scale = roomWidthPx / room.width;

      roomEl.innerHTML = "";
      roomEl.style.width = roomWidthPx + "px";
      roomEl.style.height = room.depth * scale + "px";

      const door = document.createElement("div");
      door.className = "door";
      if (layout.door.orientation === "vertical") {
        door.style.left = layout.door.x * scale - 2 + "px";
        door.style.top = layout.door.y * scale + "px";
        door.style.width = "5px";
        door.style.height = layout.door.width * scale + "px";
      } else {
        door.style.left = layout.door.x * scale + "px";
        door.style.top = layout.door.y * scale - 2 + "px";
        door.style.width = layout.door.width * scale + "px";
        door.style.height = "5px";
      }
      roomEl.appendChild(door);

      layout.objects.forEach((obj) => {
        const item = document.createElement("div");
        item.className = "item";
        item.dataset.objectId = obj.id;
        item.style.left = obj.x * scale + "px";
        item.style.top = obj.y * scale + "px";
        item.style.width = obj.width * scale + "px";
        item.style.height = obj.depth * scale + "px";
        item.style.background = args.object_colors[obj.type] || "#9AA3AF";
        item.style.opacity = "0.82";
        item.textContent = obj.type;
        item.style.color = args.theme.plot_text;

        if (args.editable_ids.includes(obj.id)) {
          item.addEventListener("pointerdown", onPointerDown);
          item.addEventListener("dblclick", onDoubleClick);
        } else {
          item.style.cursor = "default";
        }

        roomEl.appendChild(item);
      });

      coordsEl.textContent = "Grid snap: 10 cm";
      setFrameHeight();
    }

    function getObjectById(objectId) {
      return latestArgs.layout_data.objects.find((obj) => obj.id === objectId);
    }

    function onPointerDown(event) {
      const objectId = event.currentTarget.dataset.objectId;
      const obj = getObjectById(objectId);
      const roomRect = roomEl.getBoundingClientRect();
      const currentLeftPx = obj.x * scale;
      const currentTopPx = obj.y * scale;

      activeDrag = {
        element: event.currentTarget,
        objectId: objectId,
        pointerId: event.pointerId,
        startClientX: event.clientX,
        startClientY: event.clientY,
        offsetX: event.clientX - roomRect.left - currentLeftPx,
        offsetY: event.clientY - roomRect.top - currentTopPx,
        hasMoved: false,
      };

      activeDrag.element.setPointerCapture(event.pointerId);
      activeDrag.element.addEventListener("pointermove", onPointerMove);
      activeDrag.element.addEventListener("pointerup", onPointerUp);
      activeDrag.element.addEventListener("pointercancel", onPointerUp);
    }

    function onPointerMove(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
        return;
      }

      const obj = getObjectById(activeDrag.objectId);
      const roomRect = roomEl.getBoundingClientRect();
      const deltaX = event.clientX - activeDrag.startClientX;
      const deltaY = event.clientY - activeDrag.startClientY;
      if (!activeDrag.hasMoved) {
        const distance = Math.sqrt(deltaX * deltaX + deltaY * deltaY);
        if (distance < dragThresholdPx) {
          return;
        }
        activeDrag.hasMoved = true;
        activeDrag.element.classList.add("active");
      }

      const rawX = (event.clientX - roomRect.left - activeDrag.offsetX) / scale;
      const rawY = (event.clientY - roomRect.top - activeDrag.offsetY) / scale;
      const nextX = clamp(snapToGrid(rawX), 0, latestArgs.layout_data.room.width - obj.width);
      const nextY = clamp(snapToGrid(rawY), 0, latestArgs.layout_data.room.depth - obj.depth);

      activeDrag.element.style.left = nextX * scale + "px";
      activeDrag.element.style.top = nextY * scale + "px";
      coordsEl.textContent = obj.type + ": x " + nextX + " cm, y " + nextY + " cm";
    }

    function onPointerUp(event) {
      if (!activeDrag || event.pointerId !== activeDrag.pointerId) {
        return;
      }

      const obj = getObjectById(activeDrag.objectId);
      const leftPx = parseFloat(activeDrag.element.style.left || "0");
      const topPx = parseFloat(activeDrag.element.style.top || "0");
      const newX = snapToGrid(leftPx / scale);
      const newY = snapToGrid(topPx / scale);

      activeDrag.element.classList.remove("active");
      activeDrag.element.releasePointerCapture(event.pointerId);
      activeDrag.element.removeEventListener("pointermove", onPointerMove);
      activeDrag.element.removeEventListener("pointerup", onPointerUp);
      activeDrag.element.removeEventListener("pointercancel", onPointerUp);

      if (!activeDrag.hasMoved) {
        activeDrag = null;
        return;
      }

      activeDrag = null;

      coordsEl.textContent = obj.type + " updated: x " + newX + " cm, y " + newY + " cm";
      setComponentValue({
        event_id: Date.now(),
        orientations: {
          [obj.id]: obj.orientation || 0
        },
        positions: {
          [obj.id]: {
            x: newX,
            y: newY
          }
        }
      });
    }

    function onDoubleClick(event) {
      const objectId = event.currentTarget.dataset.objectId;
      const obj = getObjectById(objectId);
      const nextOrientation = ((obj.orientation || 0) + 90) % 360;

      coordsEl.textContent = obj.type + " rotated to " + nextOrientation + " deg";
      setComponentValue({
        event_id: Date.now(),
        orientations: {
          [obj.id]: nextOrientation
        }
      });
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type !== "streamlit:render") {
        return;
      }
      renderLayout(data.args || {});
    });

    window.addEventListener("load", () => {
      componentReady();
      setFrameHeight();
    });

    window.addEventListener("resize", () => {
      if (latestArgs) {
        renderLayout(latestArgs);
      } else {
        setFrameHeight();
      }
    });
  </script>
</body>
</html>
