<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Layout 3D Preview</title>
  <style>
    :root {
      --bg: #ffffff;
      --panel: #f8fafc;
      --border: #27313f;
      --muted: #657080;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: transparent;
      color: var(--border);
    }

    .wrap {
      border: 1px solid color-mix(in srgb, var(--border) 12%, transparent);
      border-radius: 10px;
      background: var(--bg);
      padding: 0.9rem;
    }

    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      align-items: baseline;
      margin-bottom: 0.75rem;
    }

    .title {
      font-size: 1rem;
      font-weight: 700;
    }

    .hint {
      font-size: 0.82rem;
      color: var(--muted);
    }

    #scene {
      width: 100%;
      height: 470px;
      border-radius: 10px;
      overflow: hidden;
      background: linear-gradient(180deg, color-mix(in srgb, var(--panel) 94%, white), var(--panel));
      border: 1px solid color-mix(in srgb, var(--border) 10%, transparent);
    }

    .fallback {
      display: none;
      padding: 1rem 0.25rem 0.2rem;
      color: var(--muted);
      font-size: 0.9rem;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="toolbar">
      <div class="title">Interactive 3D room preview</div>
      <div class="hint">Orbit: drag, Zoom: wheel, Pan: right click</div>
    </div>
    <div id="scene"></div>
    <div id="fallback" class="fallback">3D preview unavailable: failed to load Three.js.</div>
  </div>

  <script type="module">
    import * as THREE from "https://unpkg.com/three@0.165.0/build/three.module.js";
    import { OrbitControls } from "https://unpkg.com/three@0.165.0/examples/jsm/controls/OrbitControls.js";

    const rootEl = document.documentElement;
    const sceneHost = document.getElementById("scene");
    const fallbackEl = document.getElementById("fallback");

    let latestArgs = null;
    let renderer = null;
    let scene = null;
    let camera = null;
    let controls = null;
    let animationHandle = null;
    let contentGroup = null;

    function sendMessage(type, data) {
      window.parent.postMessage(
        Object.assign({ isStreamlitMessage: true, type: type }, data || {}),
        "*"
      );
    }

    function setFrameHeight() {
      sendMessage("streamlit:setFrameHeight", { height: document.body.scrollHeight });
    }

    function componentReady() {
      sendMessage("streamlit:componentReady", { apiVersion: 1 });
    }

    function applyTheme(theme) {
      rootEl.style.setProperty("--bg", theme.panel_bg);
      rootEl.style.setProperty("--panel", theme.room_bg);
      rootEl.style.setProperty("--border", theme.text);
      rootEl.style.setProperty("--muted", theme.subtitle);
    }

    function disposeScene() {
      if (animationHandle) {
        cancelAnimationFrame(animationHandle);
        animationHandle = null;
      }

      if (controls) {
        controls.dispose();
        controls = null;
      }

      if (renderer) {
        renderer.dispose();
        renderer.forceContextLoss();
        renderer.domElement.remove();
        renderer = null;
      }

      scene = null;
      camera = null;
      contentGroup = null;
    }

    function createLabel(text, color) {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 80;
      const ctx = canvas.getContext("2d");
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = "rgba(255,255,255,0)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.font = "700 28px Arial";
      ctx.textAlign = "center";
      ctx.textBaseline = "middle";
      ctx.fillStyle = color;
      ctx.fillText(text, canvas.width / 2, canvas.height / 2);

      const texture = new THREE.CanvasTexture(canvas);
      texture.needsUpdate = true;
      const material = new THREE.SpriteMaterial({ map: texture, transparent: true });
      const sprite = new THREE.Sprite(material);
      sprite.scale.set(55, 18, 1);
      return sprite;
    }

    function buildScene(args) {
      applyTheme(args.theme);
      fallbackEl.style.display = "none";

      const width = sceneHost.clientWidth || 800;
      const height = sceneHost.clientHeight || 470;
      const room = args.layout_data.room;

      scene = new THREE.Scene();
      scene.background = new THREE.Color(args.theme.room_bg);

      camera = new THREE.PerspectiveCamera(45, width / height, 1, 5000);
      camera.position.set(room.width * 0.9, room.width * 0.65, room.depth * 1.05);

      renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
      renderer.setPixelRatio(window.devicePixelRatio || 1);
      renderer.setSize(width, height);
      renderer.shadowMap.enabled = true;
      sceneHost.innerHTML = "";
      sceneHost.appendChild(renderer.domElement);

      controls = new OrbitControls(camera, renderer.domElement);
      controls.target.set(room.width / 2, 35, room.depth / 2);
      controls.enableDamping = true;
      controls.dampingFactor = 0.08;
      controls.minDistance = 140;
      controls.maxDistance = 1400;
      controls.maxPolarAngle = Math.PI / 2.05;

      const ambient = new THREE.AmbientLight(0xffffff, 1.4);
      scene.add(ambient);

      const dirLight = new THREE.DirectionalLight(0xffffff, 1.1);
      dirLight.position.set(room.width * 0.35, 300, room.depth * 0.2);
      dirLight.castShadow = true;
      dirLight.shadow.mapSize.width = 1024;
      dirLight.shadow.mapSize.height = 1024;
      scene.add(dirLight);

      const fillLight = new THREE.PointLight(0xffffff, 0.7, 2200);
      fillLight.position.set(room.width * 0.8, 220, room.depth * 0.9);
      scene.add(fillLight);

      contentGroup = new THREE.Group();
      scene.add(contentGroup);

      const floorMaterial = new THREE.MeshStandardMaterial({
        color: args.theme.panel_bg,
        roughness: 0.92,
        metalness: 0.05
      });
      const floor = new THREE.Mesh(
        new THREE.BoxGeometry(room.width, 4, room.depth),
        floorMaterial
      );
      floor.position.set(room.width / 2, -2, room.depth / 2);
      floor.receiveShadow = true;
      contentGroup.add(floor);

      const wallMaterial = new THREE.MeshStandardMaterial({
        color: args.theme.grid,
        roughness: 0.95,
        metalness: 0.02
      });

      const wallHeight = 120;
      const backWall = new THREE.Mesh(
        new THREE.BoxGeometry(room.width, wallHeight, 4),
        wallMaterial
      );
      backWall.position.set(room.width / 2, wallHeight / 2, room.depth);
      contentGroup.add(backWall);

      const leftWall = new THREE.Mesh(
        new THREE.BoxGeometry(4, wallHeight, room.depth),
        wallMaterial
      );
      leftWall.position.set(0, wallHeight / 2, room.depth / 2);
      contentGroup.add(leftWall);

      const rightWall = new THREE.Mesh(
        new THREE.BoxGeometry(4, wallHeight, room.depth),
        wallMaterial
      );
      rightWall.position.set(room.width, wallHeight / 2, room.depth / 2);
      contentGroup.add(rightWall);

      args.layout_data.objects.forEach((obj) => {
        const objectHeight = obj.type === "table" ? 74 : 92;
        const geometry = new THREE.BoxGeometry(obj.width, objectHeight, obj.depth);
        const material = new THREE.MeshStandardMaterial({
          color: args.object_colors[obj.type] || args.theme.fallback_object,
          roughness: 0.7,
          metalness: 0.1
        });
        const mesh = new THREE.Mesh(geometry, material);
        mesh.position.set(
          obj.x + obj.width / 2,
          objectHeight / 2,
          obj.y + obj.depth / 2
        );
        mesh.castShadow = true;
        mesh.receiveShadow = true;
        contentGroup.add(mesh);

        const label = createLabel(obj.type, args.theme.plot_text);
        label.position.set(obj.x + obj.width / 2, objectHeight + 14, obj.y + obj.depth / 2);
        contentGroup.add(label);
      });

      const grid = new THREE.GridHelper(
        Math.max(room.width, room.depth),
        Math.max(Math.round(Math.max(room.width, room.depth) / 20), 10),
        new THREE.Color(args.theme.text),
        new THREE.Color(args.theme.grid)
      );
      grid.position.set(room.width / 2, 0.5, room.depth / 2);
      contentGroup.add(grid);

      function animate() {
        animationHandle = requestAnimationFrame(animate);
        controls.update();
        renderer.render(scene, camera);
      }

      animate();
      setFrameHeight();
    }

    function renderLayout(args) {
      latestArgs = args;
      disposeScene();
      try {
        buildScene(args);
      } catch (error) {
        console.error(error);
        sceneHost.innerHTML = "";
        fallbackEl.style.display = "block";
        setFrameHeight();
      }
    }

    function handleResize() {
      if (!renderer || !camera || !latestArgs) {
        setFrameHeight();
        return;
      }

      const width = sceneHost.clientWidth || 800;
      const height = sceneHost.clientHeight || 470;
      renderer.setSize(width, height);
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      setFrameHeight();
    }

    window.addEventListener("message", (event) => {
      const data = event.data || {};
      if (data.type !== "streamlit:render") {
        return;
      }
      renderLayout(data.args || {});
    });

    window.addEventListener("resize", handleResize);
    window.addEventListener("load", () => {
      componentReady();
      setFrameHeight();
    });
  </script>
</body>
</html>
